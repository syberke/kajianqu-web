name: KajianQu CI

on:
  pull_request:
  push:
    branches:
      - agent/gemini-live-quran-orm

permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
  SUPABASE_SERVICE_ROLE_KEY: test-service-key
  DATABASE_URL: postgresql://user:password@localhost:5432/kajianqu
  DIRECT_URL: postgresql://user:password@localhost:5432/kajianqu
  GEMINI_API_KEY: test-gemini-key

jobs:
  lint-changed-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install
      - name: Lint migrated Quran admin and Asatidz scope
        shell: bash
        run: |
          set +e
          npx eslint \
            'app/(public)/layout.tsx' \
            'app/(public)/quran/**/*.{ts,tsx}' \
            'app/api/ai/**/*.ts' \
            'app/api/quran/**/*.ts' \
            'app/api/asatidz/materials/**/*.ts' \
            'app/api/keilmuan/**/*.ts' \
            'app/api/admin/notifications/**/*.ts' \
            'app/api/admin/reports/**/*.ts' \
            'app/api/admin/settings/**/*.ts' \
            'app/dashboard/admin/layout.tsx' \
            'app/dashboard/admin/settings/page.tsx' \
            'app/dashboard/asatidz/keilmuan/**/*.{ts,tsx}' \
            'app/sahabat-quran/page.tsx' \
            'components/quran/**/*.{ts,tsx}' \
            'lib/auth/**/*.ts' \
            'lib/db.ts' \
            'lib/gemini-live-config.ts' \
            'lib/quran-alignment.ts' \
            'lib/quran-api.ts' \
            'service/materi.ts' \
            'service/quran-session.service.ts' \
            'types/quran.ts' 2>&1 | tee lint.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload lint log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-log
          path: lint.log

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install
      - name: Build application
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

  audit-quran-flow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit active Quran flow
        shell: bash
        run: |
          set +e
          : > audit.log
          grep -RInE 'GROQ_API_KEY|transcribe-quran|useQuranRecorder|QuranSetoranClient' app components lib service supabase >> audit.log
          obsolete_status=$?
          grep -RInE '@/lib/quran-data|@/lib/quran-service|QuranService' app components service >> audit.log
          legacy_status=$?
          grep -RInE 'dummy|console\.log' \
            'app/(public)/quran' \
            'app/api/ai' \
            'app/api/quran' \
            'components/quran' \
            'lib/quran-alignment.ts' \
            'lib/quran-api.ts' \
            'service/quran-session.service.ts' >> audit.log
          marker_status=$?
          cat audit.log
          if [ "$obsolete_status" -eq 0 ] || [ "$legacy_status" -eq 0 ] || [ "$marker_status" -eq 0 ]; then
            exit 1
          fi
      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quran-audit-log
          path: audit.log

  audit-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect application page audit
        shell: bash
        run: |
          find app -name 'page.tsx' -print | sort > page-audit.log
          printf '\n--- MARKERS ---\n' >> page-audit.log
          grep -RInE 'dummy|TODO|console\.log|placeholder|hardcoded' app --include='page.tsx' >> page-audit.log || true
      - name: Upload page audit
        uses: actions/upload-artifact@v4
        with:
          name: page-audit-log
          path: page-audit.log
