name: KajianQu CI

on:
  pull_request:
  push:
    branches:
      - agent/gemini-live-quran-orm

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-key
      DATABASE_URL: postgresql://user:password@localhost:5432/kajianqu
      DIRECT_URL: postgresql://user:password@localhost:5432/kajianqu
      GEMINI_API_KEY: test-gemini-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Audit obsolete and dummy markers
        if: always()
        run: |
          grep -RInE "dummy|GROQ|transcribe-quran|quran-data|QuranService|console\\.log" app components lib service supabase || true
